services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sales
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales"]
      interval: 2s
      timeout: 2s
      retries: 15

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "select 1"]
      interval: 2s
      timeout: 2s
      retries: 15

  pipeline:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: sales
      POSTGRES_USER: sales
      POSTGRES_PASSWORD: sales
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    command: ["all"]

